<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex flex-col relative z-10">
    <!-- Navbar -->
    <nav class="relative z-20 bg-blue-600 text-white p-4 flex justify-between items-center sticky top-0">
        <h1 class="text-2xl font-bold">Expense Tracker</h1>
        <div class="flex gap-4 text-sm">
            <a href="#home" class="hover:text-blue-200">Home</a>
            <a href="#about" class="hover:text-blue-200">About</a>
            <a href="#contact" class="hover:text-blue-200">Contact</a>
            <button class="bg-green-500 px-4 py-1 rounded hover:bg-green-600">Sign In</button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow flex items-center justify-center p-8 pb-24">
        <div class="max-w-md w-full mx-auto bg-white p-8 rounded-2xl shadow-2xl">
            <h1 class="text-3xl font-bold text-center text-blue-600 mb-8">Expense Tracker</h1>
            
            <!-- Form -->
            <input id="d" placeholder="Description" class="w-full p-4 border-2 rounded-xl mb-4 focus:ring-4 ring-blue-200">
            <input id="a" type="number" placeholder="Amount (KSh)" class="w-full p-4 border-2 rounded-xl mb-4 focus:ring-4 ring-blue-200">
            <select id="c" class="w-full p-4 border-2 rounded-xl mb-4 focus:ring-4 ring-blue-200">
                <option value="Food">🍎 Food</option>
                <option value="Transport">🚗 Transport</option>
                <option value="Other">💳 Other</option>
            </select>
            <button onclick="add()" class="w-full bg-blue-500 text-white py-4 rounded-xl font-bold hover:bg-blue-600 shadow-lg">➕ Add</button>
            
            <!-- Filter & Total -->
            <select id="f" onchange="tracker.show()" class="w-full p-4 border-2 rounded-xl mt-6 mb-4 bg-white">
                <option value="">📊 All</option>
                <option value="Food">🍎 Food</option>
                <option value="Transport">🚗 Transport</option>
                <option value="Other">💳 Other</option>
            </select>
            <div id="t" class="text-3xl font-black text-green-600 text-center p-6 bg-green-50 rounded-2xl border-4 border-green-200 shadow-xl">Total: KSh 0</div>
            
            <!-- List -->
            <ul id="l" class="mt-6 space-y-3 max-h-80 overflow-y-auto"></ul>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-blue-700 text-white p-6 text-center mt-auto border-t-4 border-blue-800">
        <p class="text-lg font-semibold">&copy; 2026 Expense Tracker by Edward Mulwa</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
