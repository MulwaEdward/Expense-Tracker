<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>

</head>
<body class="min-h-screen flex flex-col relative z-10">

<div class="absolute inset-0 bg-black bg-opacity-60 z-0"></div>

<!-- Navbar Area Display -->
<nav class="relative z-20 bg-blue-600 text-white p-4 flex justify-between items-center">
    <h1 class="text-2xl font-bold">Expense Tracker</h1>
    <div class="flex gap-4">
      <a href="#home" class="hover:text-blue-200">Home</a>
      <a href="#about" class="hover:text-blue-200">About</a>
      <a href="#contact" class="hover:text-blue-200">Contact</a>
      <button class="bg-green-500 px-4 py-1 rounded hover:bg-green-600">Sign In</button>
    </div>
  </nav>

<main class="flex-grow flex items-center justify-centre p-4">
    <div class="max-w-md mx-auto bg-white p-6 rounded shadow">
        <h1 class="text-blue-500 text-3xl mb-7 text-center">Expense Tracker</h1>
        
        <!--inputs + Add-->
        <input id="d" placeholder="Description" class="w-full p-3 border rounded mb-3">
        <input id="a" type="number" placeholder="Amount" class="w-full p-3 border rounded mb-3">
        
        <select id="c" class="w-full p-3 border rounded mb-3">
        <option value="Food">Food</option>
        <option value="Transport">Transport</option>
        <option value="Other">Other</option>
        </select>

        <button onclick="add()" class="w-full bg-blue-500 text-white py-3 rounded hover:bg-blue-600">Add Expense</button>

        <!--Filter + Total-->
    <select id="f" onchange="tracker.show()" class="w-full p-3 border rounded mt-4 mb-3">
       <option value="">All</option>
       <option value="Food">Food</option>
       <option value="Transport">Transport</option>
       <option value="Other">Other</option>
    </select>
    
    <div id="t" class="text-2xl font-bold text-center p-3 bg-gray-100 rounded">Total: Ksh 0</div>
   
    <!--List-->
    <ul id="l" class="mt-4 space-y-2"></ul>
    </div>
</main>
<!-- Footer -->
  <footer class="bg-blue-600 text-white p-4 text-center">
    <p>&copy; 2026 Expense Tracker by Edward Mulwa</p>
  </footer>

<script src="script.js"></script>
</body>
</html>
